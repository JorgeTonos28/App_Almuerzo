<style>
  /* Personalización extra sobre Tailwind */
  body {
    -webkit-tap-highlight-color: transparent;
    font-family: 'Inter', sans-serif;
  }
  
  /* Scrollbar oculta para pestañas horizontales */
  .no-scrollbar::-webkit-scrollbar {
    display: none;
  }
  .no-scrollbar {
    -ms-overflow-style: none;
    scrollbar-width: none;
  }

  /* Ajuste para iOS en el footer */
  .safe-area-pb {
    padding-bottom: env(safe-area-inset-bottom, 1rem);
  }

  /* Animaciones suaves */
  .fade-enter-active, .fade-leave-active {
    transition: opacity 0.3s ease;
  }
  .fade-enter-from, .fade-leave-to {
    opacity: 0;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .animate-fade-in-up {
    animation: fadeInUp 0.5s ease-out forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .animate-fade-in {
    animation: fadeIn 0.5s ease-out forwards;
  }

  @keyframes wave {
    0% { transform: rotate(0deg); }
    20% { transform: rotate(15deg); }
    40% { transform: rotate(-10deg); }
    60% { transform: rotate(5deg); }
    100% { transform: rotate(0deg); }
  }
  .animate-wave {
    display: inline-block;
    animation: wave 2s infinite;
    transform-origin: 70% 70%;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    75% { transform: translateX(5px); }
  }
  .animate-shake {
    animation: shake 0.4s ease-in-out;
  }

  @keyframes bounceSlow {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .animate-bounce-slow {
    animation: bounceSlow 3s infinite ease-in-out;
  }

  @keyframes featurePulse {
    0%, 100% {
      box-shadow: 0 10px 28px -20px rgba(180, 83, 9, 0.55);
      transform: translateY(0);
    }
    50% {
      box-shadow: 0 16px 34px -22px rgba(180, 83, 9, 0.45);
      transform: translateY(-2px);
    }
  }

  .summary-overview {
    position: relative;
    width: fit-content;
    max-width: 100%;
  }

  .feature-hint-popover {
    position: relative;
    z-index: 5;
    width: min(24rem, 100%);
    border-radius: 1.1rem;
    border: 1px solid rgba(129, 140, 248, 0.28);
    background: linear-gradient(135deg, #4f46e5 0%, #2563eb 100%);
    box-shadow: 0 24px 44px -26px rgba(37, 99, 235, 0.45);
    padding: 0.55rem 0.85rem;
    animation: featurePulse 2.1s ease-in-out infinite;
    outline: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    pointer-events: auto;
  }

  .feature-hint-popover:focus {
    box-shadow: 0 0 0 3px rgba(191, 219, 254, 0.34), 0 24px 44px -26px rgba(37, 99, 235, 0.45);
  }

  .summary-cost-popover {
    min-height: 0;
    width: min(24rem, calc(100vw - 3rem));
  }

  .caldo-hint-popover {
    width: min(22rem, 100%);
  }

  .feature-hint-badge {
    width: 1.85rem;
    height: 1.85rem;
    border-radius: 9999px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    background: rgba(255, 255, 255, 0.2);
    color: #ffffff;
    font-size: 0.75rem;
  }

  .caldo-hint-badge {
    background: rgba(255, 255, 255, 0.18);
    color: #dbeafe;
  }

  .feature-hint-title {
    font-size: 0.77rem;
    line-height: 0.95rem;
    font-weight: 800;
    color: #ffffff;
  }

  .feature-hint-text {
    margin-top: 0.15rem;
    font-size: 0.68rem;
    line-height: 0.92rem;
    color: rgba(224, 231, 255, 0.96);
  }

  .summary-cards-grid-scroll {
    max-height: 41rem;
    overflow-y: auto;
    padding-right: 0.35rem;
  }

  .summary-cards-grid-scroll::-webkit-scrollbar {
    width: 8px;
  }

  .summary-cards-grid-scroll::-webkit-scrollbar-thumb {
    background: rgba(148, 163, 184, 0.45);
    border-radius: 9999px;
  }

  .summary-cards-grid-scroll::-webkit-scrollbar-track {
    background: rgba(241, 245, 249, 0.85);
    border-radius: 9999px;
  }

  .feature-hint-close {
    width: 1.6rem;
    height: 1.6rem;
    border-radius: 9999px;
    color: rgba(255, 255, 255, 0.72);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background-color 0.2s ease, color 0.2s ease;
  }

  .feature-hint-close:hover {
    background: rgba(255, 255, 255, 0.14);
    color: #ffffff;
  }

  @media (max-width: 720px) {
    .summary-overview {
      width: 100%;
    }

    .summary-cards-grid-scroll {
      max-height: 34rem;
      padding-right: 0.2rem;
    }
  }

  @media (min-width: 768px) {
    .summary-cost-popover {
      position: absolute;
      top: -0.75rem;
      left: calc(100% - 1.15rem);
      transform: none;
    }

    .caldo-hint-popover {
      position: absolute;
      top: -0.15rem;
      right: 0;
    }
  }

  @keyframes jumpSpin {
    0% { transform: translateY(0) rotate(0deg); }
    40% { transform: translateY(-15px) rotate(0deg); }
    100% { transform: translateY(0) rotate(360deg); }
  }
  .animate-jump-spin {
    animation: jumpSpin 0.5s ease-in-out;
  }

  /* Speech Bubble */
  .speech-bubble {
    position: absolute;
    top: 90%; /* Slight overlap or just below */
    left: 80%; /* Shift to right */
    transform: none;
    background: #111827;
    color: white;
    padding: 0.5rem 1rem;
    border-radius: 1rem;
    border-bottom-left-radius: 0; /* Comic style */
    font-size: 0.75rem;
    font-weight: bold;
    white-space: nowrap;
    z-index: 60;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    min-width: 80px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
  }
  /* Tail logic */
  .speech-bubble::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: -6px;
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 0 0 12px 12px;
    border-color: transparent transparent #111827 transparent;
    transform: rotate(0deg);
  }
</style>
